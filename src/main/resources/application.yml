server:
  # 로컬 = 8282, PaaS = 환경변수 PORT 주입
  port: ${PORT:8282}
  # 프록시(Railway) 뒤에서 X-Forwarded-Proto 반영 → req.isSecure()/https 인식(Secure 쿠키)
  forward-headers-strategy: framework
  servlet:
    encoding:
      charset: UTF-8
      force: true
    # JSP 뷰 위치
    jsp:
      registered: true

logging:
  level:
    root: info
    com.jacob.matchon: debug
  pattern:
    console: '%d{yy.MM.dd HH:mm:ss} [%thread] %-5level %logger{0} - %msg%n'

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # JSP 뷰 리졸버
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp

  # 정적 리소스 브라우저 캐싱(화면 전환 속도 개선)
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 3600
          cache-public: true
        use-last-modified: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
      # 모든 커넥션 세션 타임존을 KST 로 → now() 및 트리거가 한국시간으로 저장/조회
      connection-init-sql: SET TIME ZONE 'Asia/Seoul'

  jpa:
    hibernate:
      ddl-auto: validate   # 스키마는 Flyway 가 관리, JPA 는 검증만
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true   # Postgres LOB 경고 억제

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# 앱 고유 설정
app:
  jwt:
    # 운영에서는 반드시 환경변수로 32자 이상 비밀키 주입
    secret: ${JWT_SECRET:matchon-dev-secret-key-please-change-in-production-32bytes}
    # access token 유효기간(분)
    access-exp-min: ${JWT_ACCESS_EXP_MIN:43200}   # 30일
  kakao:
    javascript-key: ${KAKAO_JAVASCRIPT_KEY:}
    rest-api-key: ${KAKAO_REST_API_KEY:}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8282/auth/kakao/callback}
    client-secret: ${KAKAO_CLIENT_SECRET:}
  notify:
    # 카카오 알림톡 발송 모드: log(개발-콘솔출력) | kakao(실발송)
    mode: ${NOTIFY_MODE:log}
    # 알림톡 실발송(Solapi) — mode=kakao 일 때 사용. 미설정 시 발송 생략.
    kakao:
      api-key: ${SOLAPI_API_KEY:}          # Solapi API Key
      api-secret: ${SOLAPI_API_SECRET:}    # Solapi API Secret
      pf-id: ${SOLAPI_PF_ID:}              # 카카오 비즈니스 채널 pfId
      template-id: ${SOLAPI_TEMPLATE_ID:}  # 승인된 알림톡 템플릿 ID (본문 #{내용} 변수 1개)
      from: ${SOLAPI_FROM:}                # 등록된 발신번호(SMS 대체 발송용)
  naver:
    # 네이버 클라우드 플랫폼 Maps Client ID (지도용)
    maps-client-id: ${NAVER_MAPS_CLIENT_ID:}
  push:
    # 웹 푸시 VAPID 키 (운영에서는 환경변수로 교체 권장)
    vapid:
      public-key: ${VAPID_PUBLIC_KEY:BIDdNQDrkCs4YtA54dVYoGwtTty8EJlrJavBb5MNm_iBgOjEEpoO-giYb30-ZuPxurfeAgGVltI0h5pbjkxQlRI}
      private-key: ${VAPID_PRIVATE_KEY:1JjSwB3HZuBn5t8op0VWzjZBiYoxmS9pVO1vvDsc-T0}
      subject: ${VAPID_SUBJECT:mailto:admin@matchon.app}
